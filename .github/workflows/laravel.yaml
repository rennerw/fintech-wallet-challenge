name: Laravel

on:
  push:
    branches: [ "main","dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:

    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: toor
          POSTGRES_DB: tecktest
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U root"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5' # Atualizado para compatibilidade com Laravel 12
        extensions: curl,fileinfo,intl,mbstring,xml, ctype, iconv, mysql, sqlite, pdo_sqlite, pgsql, pdo_pgsql, zip
        coverage: xdebug, pcov
    - uses: actions/checkout@v4
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-progress --prefer-dist
    - name: Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install Node Modules
      run: npm install
    - name: Build Assets
      run: npm run build
    - name: Generate Key
      run: php artisan key:generate
    - name: Migrate
      run: php artisan migrate
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache
    - name: Configure DB for CI
      run: |
        echo "DB_CONNECTION=pgsql" >> .env
        echo "DB_HOST=127.0.0.1" >> .env
        echo "DB_PORT=5432" >> .env
        echo "DB_DATABASE=tecktest" >> .env
        echo "DB_USERNAME=root" >> .env
        echo "DB_PASSWORD=toor" >> .env
    - name: Execute tests (Unit and Feature tests) via PHPUnit/Pest
      run: php artisan test --coverage-clover clover.xml
    - name: Coverage Check
      uses: docker://ghcr.io/ericsizemore/phpunit-coverage-check-action
      with:
        clover_file: 'clover.xml'
        threshold: 30 #pq eu nao fiz o coverage de tuuuudo mas o ideal é 80+